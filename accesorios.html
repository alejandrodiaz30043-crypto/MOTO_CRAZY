<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catalogo de accesorios para motociclistas MotoCrazy MC.">
    <title>MotoCrazy MC | Accesorios</title>
    <link rel="stylesheet" href="./CSS/styles.css">
</head>
<body data-page="accesorios">
    <header class="site-header">
        <a class="brand" href="index.html" aria-label="MotoCrazy MC">
            <span class="brand__name">MotoCrazy</span>
            <span class="brand__tag">MC</span>
        </a>

        <nav class="site-nav" aria-label="Navegacion principal">
            <a href="index.html" data-nav="inicio" data-i18n="navHome">Inicio</a>
            <a href="motos.html" data-nav="motos" data-i18n="navMotos">Motos</a>
            <a href="accesorios.html" data-nav="accesorios" data-i18n="navAccessories">Accesorios</a>
        </nav>

        <div class="header-actions">
            <button class="utility-button" type="button" data-action="toggle-theme" aria-label="Cambiar tema">Tema</button>
            <button class="utility-button" type="button" data-action="toggle-lang" aria-label="Cambiar idioma">EN</button>
            <button class="cart-button" type="button" data-action="toggle-cart" aria-label="Abrir carrito">
                <span data-i18n="cartButton">Carrito</span>
                <span id="cartCount" class="cart-count">0</span>
            </button>
        </div>
    </header>

    <main>
        <section class="page-hero page-hero--compact">
            <div>
                <p class="eyebrow" data-i18n="accessoriesEyebrow">Equipamiento</p>
                <h1 data-i18n="accessoriesTitle">Accesorios para piloto y moto</h1>
                <p data-i18n="accessoriesIntro">Completa tu ruta con proteccion, comodidad y repuestos esenciales.</p>
            </div>
        </section>

        <section class="section catalog-toolbar" aria-label="Filtros del catalogo">
            <label class="search-box">
                <span data-i18n="searchLabel">Buscar</span>
                <input id="searchInput" type="search" data-i18n-placeholder="searchAccessories" placeholder="Buscar accesorio...">
            </label>
            <div id="categoryFilters" class="filter-row" aria-label="Categorias"></div>
        </section>

        <section class="section">
            <p id="catalogStatus" class="inline-status" aria-live="polite"></p>
            <div id="productGrid" class="product-grid catalog-grid"></div>
        </section>
    </main>

    <footer class="site-footer">
        <p data-i18n="footerText">MotoCrazy MC - Proyecto web con HTML, CSS, JavaScript, Supabase y API gratuita.</p>
    </footer>

    <script src="./base/supabase.js"></script>
    <script src="./base/app.js"></script>
</body>
</html>
