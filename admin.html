<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Panel administrativo MotoCrazy MC para CRUD de motos y accesorios.">
    <title>MotoCrazy MC | Admin</title>
    <link rel="stylesheet" href="./CSS/styles.css">
</head>
<body data-page="admin">
    <header class="site-header">
        <a class="brand" href="index.html" aria-label="MotoCrazy MC">
            <span class="brand__name">MotoCrazy</span>
            <span class="brand__tag">MC</span>
        </a>

        <nav class="site-nav" aria-label="Navegacion principal">
            <a href="index.html" data-nav="inicio" data-i18n="navHome">Inicio</a>
            <a href="motos.html" data-nav="motos" data-i18n="navMotos">Motos</a>
            <a href="accesorios.html" data-nav="accesorios" data-i18n="navAccessories">Accesorios</a>
            <a href="admin.html" data-nav="admin" data-i18n="adminNav">Admin</a>
        </nav>

        <div class="header-actions">
            <button class="utility-button" type="button" data-action="toggle-theme" aria-label="Cambiar tema">Tema</button>
            <button class="utility-button" type="button" data-action="toggle-lang" aria-label="Cambiar idioma">EN</button>
            <button class="cart-button" type="button" data-action="toggle-cart" aria-label="Abrir carrito">
                <span data-i18n="cartButton">Carrito</span>
                <span id="cartCount" class="cart-count">0</span>
            </button>
        </div>
    </header>

    <main>
        <section class="page-hero page-hero--compact">
            <div>
                <p class="eyebrow" data-i18n="databaseEyebrow">Base de datos</p>
                <h1 data-i18n="adminTitle">Panel administrativo</h1>
                <p data-i18n="adminIntro">Gestiona motos y accesorios conectados a Supabase.</p>
                <p class="inline-status" data-i18n="adminAuthHint">Inicia sesion para crear, editar o eliminar registros.</p>
            </div>
        </section>

        <section class="section">
            <div id="adminPanel" class="admin-panel"></div>
        </section>
    </main>

    <footer class="site-footer">
        <p data-i18n="footerText">MotoCrazy MC - Proyecto web con HTML, CSS, JavaScript, Supabase y API gratuita.</p>
    </footer>

    <script src="./base/supabase.js"></script>
    <script src="./base/app.js"></script>
</body>
</html>
