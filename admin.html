<!DOCTYPE html>
<html lang="es" data-tema="oscuro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Panel administrativo MotoCrazy MC para CRUD de motos y accesorios.">
    <title>MotoCrazy MC | Admin</title>
    <link rel="stylesheet" href="./CSS/estilos.css?v=3">
</head>
<body data-pagina="admin">
    <header class="encabezado-sitio">
        <a class="marca" href="index.html" aria-label="MotoCrazy MC">
            <span class="marca__nombre">MotoCrazy</span>
            <span class="marca__etiqueta">MC</span>
        </a>

        <nav class="navegacion-sitio" aria-label="Navegacion principal">
            <a href="index.html" data-navegacion="inicio" data-i18n="navInicio">Inicio</a>
            <a href="motos.html" data-navegacion="motos" data-i18n="navMotos">Motos</a>
            <a href="accesorios.html" data-navegacion="accesorios" data-i18n="navAccesorios">Accesorios</a>
            <a href="admin.html" data-navegacion="admin" data-i18n="navAdministracion" hidden aria-hidden="true">Admin</a>
        </nav>

        <section class="acciones-encabezado">
            <button class="boton-utilidad" type="button" data-accion="alternar-tema" aria-label="Cambiar tema">Tema</button>
            <button class="boton-utilidad" type="button" data-accion="alternar-idioma" aria-label="Cambiar idioma">EN</button>
            <button class="boton-carrito" type="button" data-accion="alternar-carrito" aria-label="Abrir carrito">
                <span data-i18n="textoBotonCarrito">Carrito</span>
                <span id="contadorCarrito" class="contador-carrito">0</span>
            </button>
        </section>
    </header>

    <main>
        <section class="portada-pagina portada-pagina--compacta">
            <section>
                <p class="ceja" data-i18n="cejaBaseDatos">Base de datos</p>
                <h1 data-i18n="tituloAdministracion">Panel administrativo</h1>
                <p data-i18n="introAdministracion">Gestiona motos y accesorios conectados a Supabase.</p>
                <p class="estado-linea" data-i18n="pistaAdministracion">Inicia sesion para crear, editar o eliminar registros.</p>
            </section>
        </section>

        <section class="seccion">
            <section id="panelAdmin" class="panel-admin"></section>
        </section>
    </main>

    <footer class="pie-sitio">
        <p data-i18n="textoPie">MotoCrazy MC - Proyecto web con HTML, CSS, JavaScript, Supabase y API gratuita.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/cliente-supabase.js"></script>
    <script src="./js/autenticacion.js?v=3"></script>
    <script src="./js/administracion.js"></script>
    <script src="./js/motos.js"></script>
    <script src="./js/accesorios.js"></script>
    <script src="./js/carrito.js"></script>
    <script src="./js/finalizar-compra.js"></script>
</body>
</html>
