<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motocrazy MC</title>
    <link rel="stylesheet" href="styles2.css">
</head>
<body>

    <header>
        <h2><strong>MotoCrazy</strong> <mark>MC</mark></h2>
        <nav>
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Motos</a></li>
                <li><a href="#">Accesorios</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
        <aside class="user-tools">
            <span>🛒 <small>3</small></span>
        </aside>
    </header>

    <main>
        <section class="hero">
            <article>
                <h1>VIVE LA PASIÓN <span>SOBRE DOS RUEDAS</span></h1>
                <p>Rendimiento, estilo y seguridad en cada curva.</p>
                <button>VER CATÁLOGO</button>
            </article>
            <figure>
                <img src="hero.jpg" alt="Moto Deportiva Roja">
            </figure>
        </section>

        <section class="catalog">
            <header>
                <h2>MOTOS DESTACADAS</h2>
            </header>

            <section class="grid">
                <article class="card">
                    <figure><img src="https://via.placeholder.com/200" alt="Yamaha R1M"></figure>
                    <h3>Yamaha R1M</h3>
                    <data value="95000000">$95.000.000</data>
                    <footer><button>Agregar</button></footer>
                </article>

                <article class="card">
                    <figure><img src="https://via.placeholder.com/200" alt="BMW S1000RR"></figure>
                    <h3>BMW S1000RR</h3>
                    <data value="95000000">$95.000.000</data>
                    <footer><button>Agregar</button></footer>
                </article>
                
                </section>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Motocrazy MC - Pasión por la velocidad</p>
    </footer>

</body>
</html>
