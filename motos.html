<!DOCTYPE html>
<html lang="es" data-tema="oscuro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catalogo de motocicletas MotoCrazy MC.">
    <title>MotoCrazy MC | Motos</title>
    <link rel="stylesheet" href="./CSS/estilos.css?v=3">
</head>
<body data-pagina="motos">
    <header class="encabezado-sitio">
        <a class="marca" href="index.html" aria-label="MotoCrazy MC">
            <span class="marca__nombre">MotoCrazy</span>
            <span class="marca__etiqueta">MC</span>
        </a>

        <nav class="navegacion-sitio" aria-label="Navegacion principal">
            <a href="index.html" data-navegacion="inicio" data-i18n="navInicio">Inicio</a>
            <a href="motos.html" data-navegacion="motos" data-i18n="navMotos">Motos</a>
            <a href="accesorios.html" data-navegacion="accesorios" data-i18n="navAccesorios">Accesorios</a>
            <a href="admin.html" data-navegacion="admin" data-i18n="navAdministracion" hidden aria-hidden="true">Admin</a>
        </nav>

        <section class="acciones-encabezado">
            <section class="contenedor-menu-usuario">
                <button class="boton-icono-usuario" type="button" aria-label="Abrir opciones de usuario" aria-haspopup="true">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M20 21a8 8 0 0 0-16 0"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </button>
                <aside class="desplegable-usuario" role="menu">
                    <p class="titulo-desplegable">Escoja una opci&oacute;n para entrar</p>
                    <button class="boton-primario" type="button" data-accion="abrir-registro-autenticacion">REGISTRARME COMO USUARIO</button>
                    <button class="boton-primario" type="button" data-accion="abrir-inicio-autenticacion">INICIAR SESI&Oacute;N</button>
                    <button class="boton-secundario" type="button" data-accion="cerrar-sesion">CERRAR SESI&Oacute;N</button>
                    <button class="boton-enlace" type="button" data-accion="abrir-recuperacion-autenticacion">Recuperar contrase&ntilde;a</button>
                    <hr>
                    <button class="boton-social" type="button" data-accion="autenticacion-oauth" data-proveedor="google"><span class="icono-social icono-social--google">G</span> ENTRAR CON GOOGLE</button>
                    <button class="boton-social" type="button" data-accion="autenticacion-oauth" data-proveedor="facebook"><span class="icono-social icono-social--facebook">f</span> ENTRAR CON FACEBOOK</button>
                    <button class="boton-social" type="button" data-accion="autenticacion-oauth" data-proveedor="apple"><span class="icono-social icono-social--apple">A</span> ENTRAR CON APPLE</button>
                </aside>
            </section>
            <button class="boton-utilidad" type="button" data-accion="alternar-tema" aria-label="Cambiar tema">Tema</button>
            <button class="boton-utilidad" type="button" data-accion="alternar-idioma" aria-label="Cambiar idioma">EN</button>
            <button class="boton-carrito" type="button" data-accion="alternar-carrito" aria-label="Abrir carrito">
                <span data-i18n="textoBotonCarrito">Carrito</span>
                <span id="contadorCarrito" class="contador-carrito">0</span>
            </button>
        </section>
    </header>

    <main>
        <section class="portada-pagina portada-pagina--compacta">
            <section>
                <p class="ceja" data-i18n="cejaMotos">Catalogo</p>
                <h1 data-i18n="tituloMotos">Motos para cada estilo</h1>
                <p data-i18n="introMotos">Filtra por categoria, compara precios y agrega tus favoritas al carrito.</p>
            </section>
        </section>

        <section class="seccion barra-catalogo" aria-label="Filtros del catalogo">
            <label class="caja-busqueda">
                <span data-i18n="etiquetaBusqueda">Buscar</span>
                <input id="entradaBusqueda" type="search" data-i18n-placeholder="busquedaMotos" placeholder="Buscar moto...">
            </label>
            <section id="filtrosAvanzados" class="filtros-avanzados"></section>
            <section id="filtrosCategorias" class="fila-filtros" aria-label="Categorias"></section>
        </section>

        <section class="seccion seccion--ajustada">
            <section id="cotizadorCuotas" class="cotizador-cuotas" aria-live="polite"></section>
        </section>

        <section class="seccion">
            <p id="estadoCatalogo" class="estado-linea" aria-live="polite"></p>
            <section id="grillaProductos" class="grilla-productos grilla-catalogo"></section>
        </section>

        <section class="seccion">
            <section id="panelComparacion" class="panel-comparacion"></section>
        </section>
    </main>

    <footer class="pie-sitio">
        <p data-i18n="textoPie">MotoCrazy MC - Proyecto web con HTML, CSS, JavaScript, Supabase y API gratuita.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/cliente-supabase.js"></script>
    <script src="./js/autenticacion.js?v=3"></script>
    <script src="./js/administracion.js"></script>
    <script src="./js/motos.js"></script>
    <script src="./js/accesorios.js"></script>
    <script src="./js/carrito.js"></script>
    <script src="./js/finalizar-compra.js"></script>
</body>
</html>
